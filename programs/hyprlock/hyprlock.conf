# hyprlock — lock screen for hyprland

background {
    monitor =
    path = /home/ikaikyy/dotfiles/images/wallpapers/vestrahorn-iceland.webp
    blur_passes = 3
    blur_size = 12
    noise = 0.02
    contrast = 0.9
    brightness = 0.6
}

input-field {
    monitor =
    size = 300, 40
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(0, 0, 0, 0.6)
    font_color = rgb(238, 238, 238)
    fade_on_empty = false
    font_family = JetBrainsMono Nerd Font
    placeholder_text = <i>Password...</i>
    hide_input = false
    rounding = 4
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(238, 238, 238, 0.9)
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = $DESC
    color = rgba(238, 238, 238, 0.7)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 60
    halign = center
    valign = center
}
